<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>민짱 로또 분석기 - PRO 끝판왕 (V6.0)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; padding-bottom: 60px; }
        .lotto-ball { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 13px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .ball-sm { width: 28px; height: 28px; font-size: 11px; }
        .ball-10 { background: radial-gradient(circle at 30% 30%, #fbc02d, #f57f17); }
        .ball-20 { background: radial-gradient(circle at 30% 30%, #1976d2, #0d47a1); }
        .ball-30 { background: radial-gradient(circle at 30% 30%, #d32f2f, #b71c1c); }
        .ball-40 { background: radial-gradient(circle at 30% 30%, #7b1fa2, #4a148c); }
        .ball-45 { background: radial-gradient(circle at 30% 30%, #388e3c, #1b5e20); }
        .chat-bubble { max-width: 80%; padding: 8px 12px; border-radius: 12px; font-size: 13px; position: relative; }
        .chat-bubble::after { content: ''; position: absolute; bottom: 0; width: 0; height: 0; border: 10px solid transparent; }
        .chat-other .chat-bubble { background-color: #f1f0f0; border-bottom-left-radius: 0; }
        .chat-other .chat-bubble::after { left: -10px; border-right-color: #f1f0f0; border-top: 0; }
        .chat-my .chat-bubble { background-color: #4f46e5; color: white; border-bottom-right-radius: 0; }
        .chat-my .chat-bubble::after { right: -10px; border-left-color: #4f46e5; border-top: 0; }
        #lotto-capture { padding: 20px; background: white; border-radius: 12px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg overflow-hidden border-t-8 border-blue-600 relative">
        <button onclick="secureReset()" class="absolute top-24 right-4 text-[10px] text-gray-400 hover:text-red-500 transition">기록 초기화</button>

        <div class="bg-gray-800 p-3 flex justify-around text-center text-white text-[10px]">
            <div><p class="text-gray-400">실시간</p><p id="online-count" class="text-green-400 font-bold text-sm">1</p></div>
            <div class="border-l border-gray-600"></div>
            <div><p class="text-gray-400">오늘 방문</p><p id="today-count" class="text-blue-300 font-bold text-sm">0</p></div>
            <div class="border-l border-gray-600"></div>
            <div><p class="text-gray-400">누적 방문</p><p id="total-count" class="text-yellow-400 font-bold text-sm">0</p></div>
        </div>

        <div id="latest-win-area" class="bg-blue-50 p-4 border-b border-blue-100 text-center">
            <p class="text-xs font-bold text-blue-600 mb-2">🔥 제 <span id="draw-no">000</span>회 당첨 번호 (자동)</p>
            <div id="win-balls" class="flex justify-center gap-1"></div>
        </div>

        <div class="p-6 space-y-6">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">🎰 민짱 로또 분석기 <span class="text-xs bg-red-500 text-white px-2 py-1 rounded-full">V6.0 PRO</span></h1>
            
            <div class="bg-gray-50 p-4 rounded-xl border border-gray-100 shadow-inner">
                <input type="text" id="user-name" placeholder="닉네임 입력 (예: 신민수)" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 mb-3">
                <button onclick="analyzeAndGenerate5()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-bold py-3 rounded-lg shadow-md hover:scale-[1.02] transition">데이터 분석 후 5게임 생성</button>
            </div>

            <div id="result-area" class="hidden space-y-4">
                <div id="lotto-capture">
                    <h2 class="font-bold text-center text-blue-800 mb-4">✨ 민짱의 최적 분석 조합 ✨</h2>
                    <div id="set-1" class="bg-gray-50 p-3 rounded-lg flex justify-around border border-gray-100 mb-2"></div>
                    <div id="set-2" class="bg-gray-50 p-3 rounded-lg flex justify-around border border-gray-100 mb-2"></div>
                    <div id="set-3" class="bg-gray-50 p-3 rounded-lg flex justify-around border border-gray-100 mb-2"></div>
                    <div id="set-4" class="bg-gray-50 p-3 rounded-lg flex justify-around border border-gray-100 mb-2"></div>
                    <div id="set-5" class="bg-gray-50 p-3 rounded-lg flex justify-around border border-gray-100 mb-2"></div>
                    <p class="text-[9px] text-gray-300 text-center mt-3">민짱 로또 분석기 PRO (V6.0) 생성</p>
                </div>
                <button onclick="saveAsImage()" class="w-full bg-gray-600 text-white text-sm py-2 rounded-lg hover:bg-gray-700">📸 이 조합 이미지로 저장</button>
            </div>

            <hr class="my-6">

            <div class="bg-gray-100 p-4 rounded-xl border border-gray-200 shadow-inner">
                <h2 class="font-bold text-gray-800 mb-3 flex items-center text-sm"><span class="mr-2">💬</span> 민짱의 실시간 채팅방</h2>
                <div id="chat-messages" class="space-y-3 h-48 overflow-y-auto pr-2 mb-3">
                    </div>
                <div class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="메시지 입력..." class="flex-grow p-2 border rounded-lg focus:outline-none text-sm">
                    <button onclick="sendChatMessage()" class="bg-blue-600 text-white text-sm px-4 py-2 rounded-lg hover:bg-blue-700">전송</button>
                </div>
            </div>

            <hr class="my-6">

            <div class="bg-yellow-50 p-4 rounded-xl border border-yellow-100 shadow-inner">
                <h2 class="font-bold text-yellow-800 mb-3 flex items-center text-sm"><span class="mr-2">🔍</span> 당첨 확인기 (QR코드)</h2>
                <p class="text-xs text-yellow-700 mb-3">실제 로또 용지의 QR코드를 카메라로 찍어 당첨을 확인해 보세요!</p>
                <button onclick="openQrScanner()" class="w-full bg-yellow-600 text-white font-bold py-3 rounded-lg hover:bg-yellow-700 transition">QR코드 스캔하기 (카메라 열기)</button>
                <div id="qr-result" class="hidden mt-4 p-3 bg-white rounded-lg text-center text-sm">
                    </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, query, limitToLast, set, onDisconnect, runTransaction, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 파이어베이스 설정
        const firebaseConfig = {
            apiKey: "AIzaSyCOmZG3eeHBjQpXiEk0CbRgv1yDmA_YIZU",
            authDomain: "minzzang-7077b.firebaseapp.com",
            databaseURL: "https://minzzang-7077b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "minzzang-7077b",
            storageBucket: "minzzang-7077b.firebasestorage.app",
            messagingSenderId: "864825081953",
            appId: "1:864825081953:web:2d288161a1b3d750b92a20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 당첨 번호 자동 불러오기 ---
        async function fetchLotto() {
            try {
                const response = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.dhlottery.co.kr/common.do?method=getLottoNumber'));
                const data = JSON.parse((await response.json()).contents);
                if(data.returnValue === "success") {
                    document.getElementById('draw-no').innerText = data.drwNo;
                    const winNums = [data.drwtNo1, data.drwtNo2, data.drwtNo3, data.drwtNo4, data.drwtNo5, data.drwtNo6];
                    const container = document.getElementById('win-balls');
                    container.innerHTML = '';
                    winNums.forEach(n => {
                        const colorClass = n <= 10 ? 'ball-10' : n <= 20 ? 'ball-20' : n <= 30 ? 'ball-30' : n <= 40 ? 'ball-40' : 'ball-45';
                        container.innerHTML += `<div class="lotto-ball ball-sm ${colorClass}">${n}</div>`;
                    });
                    container.innerHTML += `<div class="text-gray-400 self-center mx-1">+</div>`;
                    const bonusNum = data.bnusNo;
                    const bColor = bonusNum <= 10 ? 'ball-10' : bonusNum <= 20 ? 'ball-20' : bonusNum <= 30 ? 'ball-30' : bonusNum <= 40 ? 'ball-40' : 'ball-45';
                    container.innerHTML += `<div class="lotto-ball ball-sm ${bColor}">${bonusNum}</div>`;
                }
            } catch (e) { console.log("로또 정보를 가져오지 못했습니다."); }
        }
        fetchLotto();

        // --- 방문자 카운터 및 보안 초기화 ---
        const todayStr = new Date().toISOString().split('T')[0];
        const onlineRef = ref(db, 'status/online_users');
        const totalRef = ref(db, 'status/total_visit');
        const todayRef = ref(db, 'status/today_visit/' + todayStr);
        const myPresenceRef = push(onlineRef);
        onDisconnect(myPresenceRef).remove();
        set(myPresenceRef, true);
        onValue(onlineRef, (snap) => document.getElementById('online-count').innerText = snap.size || 1);
        runTransaction(totalRef, (curr) => (curr || 0) + 1);
        runTransaction(todayRef, (curr) => (curr || 0) + 1);
        onValue(totalRef, (snap) => document.getElementById('total-count').innerText = snap.val() || 0);
        onValue(todayRef, (snap) => document.getElementById('today-count').innerText = snap.val() || 0);

        window.secureReset = function() {
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if (pw === "0732") {
                if (confirm("정말로 모든 기록을 초기화하시겠습니까?")) {
                    remove(ref(db, 'status'));
                    remove(ref(db, 'lotto_history'));
                    remove(ref(db, 'chat_messages'));
                    alert("초기화 완료!");
                    location.reload();
                }
            } else { alert("비밀번호 불일치!"); }
        };

        // --- 실시간 채팅창 로직 ---
        const chatRef = query(ref(db, 'chat_messages'), limitToLast(50));
        onValue(chatRef, (snapshot) => {
            const chatDiv = document.getElementById('chat-messages');
            chatDiv.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                Object.values(data).forEach(msg => {
                    const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const isMyMsg = msg.userName === (document.getElementById('user-name').value || "익명"); // 내 메시지 판단
                    const msgClass = isMyMsg ? 'chat-my' : 'chat-other';
                    const nameTag = isMyMsg ? '' : `<span class="text-[9px] text-gray-400 block mb-1">${msg.userName}</span>`;
                    
                    chatDiv.innerHTML += `
                        <div class="flex ${isMyMsg ? 'justify-end' : 'justify-start'} ${msgClass}">
                            <div class="flex flex-col ${isMyMsg ? 'items-end' : 'items-start'}">
                                ${nameTag}
                                <div class="chat-bubble relative shadow-inner">
                                    ${msg.text}
                                    <span class="text-[8px] text-gray-400 block ${isMyMsg ? 'text-left' : 'text-right'} mt-1">${time}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                chatDiv.scrollTop = chatDiv.scrollHeight; // 스크롤 하단 유지
            }
        });

        window.sendChatMessage = function() {
            const input = document.getElementById('chat-input');
            const name = document.getElementById('user-name').value || "익명";
            const text = input.value;
            if(!text) return;
            push(ref(db, 'chat_messages'), {
                userName: name,
                text: text,
                timestamp: serverTimestamp()
            });
            input.value = '';
        };

        // 엔터키 전송 기능
        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if(e.key === 'Enter') sendChatMessage();
        });

        // --- 당첨 확인기 (QR코드) ---
        window.openQrScanner = function() {
            // 외부 서비스를 활용한 QR 스캔창을 엽니다. (동작을 위해 카메라 권한 필요)
            window.open("https://qr.lotto.co.kr", "_blank");
            alert("카메라가 열리면 실제 로또 용지의 QR코드를 스캔해 주세요! (카메라 권한을 허용해야 합니다.)");
        };

        // --- 번호 생성 및 저장 로직 ---
        const hotNumbers = [1, 13, 17, 27, 34, 43, 12, 18, 45, 33];
        window.analyzeAndGenerate5 = function() {
            const nameInput = document.getElementById('user-name').value;
            if (!nameInput) { alert("이름을 입력해주세요!"); return; }
            let allSets = [];
            for(let i=1; i<=5; i++){
                let nums = [];
                while(nums.length < 2) {
                    let r = hotNumbers[Math.floor(Math.random() * hotNumbers.length)];
                    if(!nums.includes(r)) nums.push(r);
                }
                while(nums.length < 6) {
                    let r = Math.floor(Math.random() * 45) + 1;
                    if(!nums.includes(r)) nums.push(r);
                }
                nums.sort((a, b) => a - b);
                allSets.push(nums);
                showBalls(nums, 'set-'+i);
            }
            const maskName = nameInput.length > 2 ? nameInput[0] + "*" + nameInput[nameInput.length - 1] : nameInput[0] + "*";
            push(ref(db, 'lotto_history'), { userName: maskName, timestamp: Date.now() });
            document.getElementById('result-area').classList.remove('hidden');
        };

        function showBalls(nums, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            nums.forEach(n => {
                const colorClass = n <= 10 ? 'ball-10' : n <= 20 ? 'ball-20' : n <= 30 ? 'ball-30' : n <= 40 ? 'ball-40' : 'ball-45';
                container.innerHTML += `<div class="lotto-ball ${colorClass}">${n}</div>`;
            });
        }

        const historyRef = query(ref(db, 'lotto_history'), limitToLast(10));
        onValue(historyRef, (snapshot) => {
            const historyDiv = document.getElementById('live-history');
            historyDiv.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                Object.values(data).reverse().forEach(item => {
                    const time = new Date(item.timestamp).toLocaleTimeString();
                    historyDiv.innerHTML += `<div class="bg-gray-50 p-2 rounded flex justify-between items-center border-l-4 border-indigo-400"><span><strong>${item.userName}</strong> 님이 분석 완료</span><span class="text-xs text-gray-400">${time}</span></div>`;
                });
            }
        });

        // --- 이미지로 저장 기능 ---
        window.saveAsImage = function() {
            const name = document.getElementById('user-name').value || "익명";
            const captureArea = document.getElementById('lotto-capture');
            html2canvas(captureArea).then(canvas => {
                const link = document.createElement('a');
                link.download = `민짱로또분석_${name}_${new Date().toLocaleDateString()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
            alert("번호 조합이 휴대폰(또는 PC)에 이미지로 저장되었습니다!");
        };

    </script>
</body>
</html>
