<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>민짱 로또 분석기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        header { text-align: center; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        
        /* 방문자 통계 스타일 */
        .stats-container { background: #f8f9fa; padding: 10px; border-radius: 5px; display: inline-block; margin-bottom: 10px; border: 1px solid #e9ecef; }
        .stats { color: #495057; font-size: 0.95em; font-weight: bold; }
        .stats span { color: #3498db; margin: 0 5px; }
        
        .winning-numbers { font-size: 1.2em; font-weight: bold; color: #e74c3c; margin-top: 5px; }
        
        .container { display: flex; gap: 20px; }
        .box { flex: 1; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 5세트 묶음 디자인 */
        .combo-row { display: flex; align-items: center; justify-content: space-between; background: #fdfdfd; padding: 10px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 8px; }
        .row-label { font-weight: bold; font-size: 1.2em; color: #34495e; width: 30px; }
        .balls-container { display: flex; gap: 8px; }
        .ball { width: 40px; height: 40px; border-radius: 50%; background: #3498db; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .lock-container { display: flex; align-items: center; gap: 5px; font-weight: bold; color: #e74c3c; cursor: pointer; }
        
        button { background: #2ecc71; color: white; border: none; padding: 12px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; font-size: 1.05em; }
        button:hover { background: #27ae60; }
        
        /* 공유 영역 디자인 */
        .share-area { display: flex; gap: 10px; margin-top: 15px; margin-bottom: 10px; }
        .share-area input { flex: 0.4; padding: 10px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-weight: bold; }
        .btn-share { flex: 1; background: #e67e22; margin-bottom: 0; }
        .btn-share:hover { background: #d35400; }

        /* 게시판 UI */
        .board-header { display: flex; justify-content: space-between; align-items: center; font-size: 1.1em; font-weight: bold; margin-bottom: 15px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .btn-delete { background: #e74c3c; font-size: 0.8em; padding: 5px 10px; width: auto; margin: 0; }
        .btn-delete:hover { background: #c0392b; }
        
        .board-item { padding: 15px 10px; border-bottom: 1px solid #eee; font-size: 0.95em; background: #fafafa; border-radius: 5px; margin-bottom: 10px; }
        .board-item-title { font-weight: bold; color: #e74c3c; margin-bottom: 8px; font-size: 1.05em; }
        .board-item-combo { margin-left: 10px; color: #2c3e50; line-height: 1.6; }

        /* 채팅방 UI */
        .chat-box { height: 200px; border: 1px solid #ddd; border-radius: 5px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #fff; }
        .chat-input-area { display: flex; gap: 5px; }
        .chat-input-area input { padding: 8px; border: 1px solid #ccc; border-radius: 3px; }
        #chatName { width: 60px; text-align: center; }
        #chatMsg { flex: 1; }
    </style>
</head>
<body onload="generateNumbers(true)">

<header>
    <h1>민짱 로또 분석기</h1>
    
    <div class="stats-container">
        <div class="stats">
            실시간 접속자: <span>14명</span> | 일일 방문자: <span>345명</span> | 누적 방문자수: <span>12,345명</span>
        </div>
    </div>
    
    <div class="winning-numbers">1217회 당첨번호: 8 10 15 20 29 31 + 41</div>
</header>

<div class="container">
    <div class="box" style="flex: 1.3;">
        <h3>🎯 5게임 묶음 추출기</h3>
        <div id="comboContainer">
            </div>
        
        <button onclick="generateNumbers(false)">🔄 고정 안 된 세트만 새로고침</button>
        
        <div class="share-area">
            <input type="text" id="purchaserName" placeholder="구매자 이름 (예: 신민수)">
            <button class="btn-share" onclick="shareCombination()">📢 확정된 5게임 게시판에 공유</button>
        </div>

        <h3 style="margin-top: 30px;">💬 실시간 채팅</h3>
        <div class="chat-box" id="chatBox">
            <div><strong style="color: #3498db;">시스템:</strong> 익명 채팅방에 오신 것을 환영합니다!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatName" placeholder="닉네임" value="민짱">
            <input type="text" id="chatMsg" placeholder="메시지를 입력하세요" onkeypress="if(event.keyCode==13) sendMessage()">
            <button style="width: 60px; margin-bottom: 0;" onclick="sendMessage()">전송</button>
        </div>
    </div>

    <div class="box" style="flex: 0.7;">
        <div class="board-header">
            <span>실시간 구매 확정 현황</span>
            <button class="btn-delete" onclick="clearBoard()">🗑️ 기록삭제</button>
        </div>
        <div id="lottoList">
            <div class="board-item">
                <div class="board-item-title">신** 님의 확정 조합 (조금 전)</div>
                <div class="board-item-combo">
                    A: 4, 12, 15, 22, 31, 40<br>
                    B: 7, 18, 23, 29, 33, 41<br>
                    C: 1, 9, 14, 25, 36, 45<br>
                    D: 3, 11, 19, 28, 37, 42<br>
                    E: 5, 10, 21, 30, 39, 44
                </div>
            </div>
        </div>
    </div>
</div>
