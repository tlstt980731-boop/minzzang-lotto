<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>민짱 로또 분석기</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        
        header { text-align: center; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; position: relative; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        
        .stats-container { background: #f8f9fa; padding: 10px; border-radius: 5px; display: inline-block; margin-bottom: 10px; border: 1px solid #e9ecef; word-break: keep-all; }
        .stats { color: #495057; font-size: 0.95em; font-weight: bold; }
        .stats span { color: #3498db; margin: 0 5px; }
        
        .winning-numbers { font-size: 1.2em; font-weight: bold; color: #e74c3c; margin-top: 5px; word-break: keep-all; }
        
        .container { display: flex; gap: 20px; }
        .box { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .box-left { flex: 1.3; }
        .box-right { flex: 0.7; }
        
        .combo-row { display: flex; align-items: center; justify-content: space-between; background: #fdfdfd; padding: 10px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 8px; }
        .row-label { font-weight: bold; font-size: 1.2em; color: #34495e; width: 25px; }
        .balls-container { display: flex; gap: 8px; }
        .ball { width: 40px; height: 40px; border-radius: 50%; background: #3498db; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .lock-container { display: flex; align-items: center; gap: 5px; font-weight: bold; color: #e74c3c; cursor: pointer; white-space: nowrap; }
        
        button { background: #2ecc71; color: white; border: none; padding: 12px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; font-size: 1.05em; }
        button:hover { background: #27ae60; }
        
        .share-area { display: flex; gap: 10px; margin-top: 15px; margin-bottom: 10px; }
        .share-area input { flex: 0.4; padding: 10px; border: 1px solid #ccc; border-radius: 5px; text-align: center; font-weight: bold; }
        .btn-share { flex: 1; background: #e67e22; margin-bottom: 0; }
        .btn-share:hover { background: #d35400; }

        .board-header { display: flex; justify-content: space-between; align-items: center; font-size: 1.1em; font-weight: bold; margin-bottom: 15px; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .btn-group { display: flex; gap: 5px; }
        .btn-check { background: #f1c40f; color: #333; font-size: 0.8em; padding: 6px 12px; margin: 0; border-radius: 5px; }
        .btn-check:hover { background: #f39c12; }
        .btn-delete { background: #e74c3c; font-size: 0.8em; padding: 6px 12px; margin: 0; border-radius: 5px; }
        .btn-delete:hover { background: #c0392b; }
        
        .board-item { padding: 15px 10px; border-bottom: 1px solid #eee; font-size: 0.95em; background: #fafafa; border-radius: 5px; margin-bottom: 10px; }
        .board-item-title { font-weight: bold; color: #e74c3c; margin-bottom: 8px; font-size: 1.05em; }
        .board-item-combo { margin-left: 10px; color: #2c3e50; line-height: 1.6; }

        .hit-number { color: #e74c3c; font-weight: bold; font-size: 1.1em; text-decoration: underline; }
        .bonus-number { color: #3498db; font-weight: bold; font-size: 1.1em; text-decoration: underline; }
        
        #hallOfFame { display: none; background: #fff3cd; border: 1px solid #ffe69c; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        #hallOfFame h4 { margin: 0 0 10px 0; color: #856404; font-size: 1.1em; }
        #winnerListContent ul { margin: 0; padding-left: 20px; color: #533f03; line-height: 1.5; }

        .chat-box { height: 200px; border: 1px solid #ddd; border-radius: 5px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #fff; }
        .chat-input-area { display: flex; gap: 5px; }
        .chat-input-area input { padding: 8px; border: 1px solid #ccc; border-radius: 3px; }
        #chatName { width: 60px; text-align: center; }
        #chatMsg { flex: 1; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { flex-direction: column; gap: 10px; }
            .stats { font-size: 0.85em; }
            .winning-numbers { font-size: 1em; }
            .combo-row { padding: 8px 5px; }
            .row-label { font-size: 1.1em; width: 15px; }
            .balls-container { gap: 4px; }
            .ball { width: 32px; height: 32px; font-size: 0.9em; }
            .lock-container { font-size: 0.85em; }
            .share-area { flex-direction: column; }
            .share-area input { flex: none; width: 100%; margin-bottom: 5px; }
            .btn-share { width: 100%; }
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <h1>민짱 로또 분석기</h1>
    <div class="stats-container">
        <div class="stats">
            실시간 접속자: <span id="realTimeVisitors">1</span>명 | 일일 방문자: <span id="dailyVisitors">1</span>명 | 누적 방문자수: <span id="totalVisitors">1</span>명
        </div>
    </div>
    
    <div class="winning-numbers">1217회 당첨번호: 8 10 15 20 29 31 + 41</div>
</header>

<div class="container">
    <div class="box box-left">
        <h3>🎯 로또 분석기</h3>
        <div id="comboContainer"></div>
        
        <button onclick="generateNumbers(false)">🔄 로또 분석 하기</button>
        
        <div class="share-area">
            <input type="text" id="purchaserName" placeholder="구매자 이름 (예: 신**)">
            <button class="btn-share" onclick="shareCombination()">📢 확정된 5게임 게시판에 공유</button>
        </div>

        <h3 style="margin-top: 30px;">💬 실시간 채팅</h3>
        <div class="chat-box" id="chatBox">
            </div>
        <div class="chat-input-area">
            <input type="text" id="chatName" placeholder="닉네임" value="민짱">
            <input type="text" id="chatMsg" placeholder="메시지를 입력하세요" onkeypress="if(event.keyCode==13) sendChat()">
            <button onclick="sendChat()" style="width: 60px; margin-bottom: 0;">전송</button>
        </div>
    </div>

    <div class="box box-right">
        <div class="board-header">
            <span>실시간 구매 확정 현황</span>
            <div class="btn-group">
                <button class="btn-check" onclick="checkWin()">🏆 당첨 확인</button>
                <button class="btn-delete" onclick="clearChat()">🗑️ 기록삭제</button>
            </div>
        </div>
        
        <div id="hallOfFame">
            <h4>🎉 이번 주 명예의 전당</h4>
            <div id="winnerListContent"></div>
        </div>

        <div id="lottoList"></div>
    </div>
</div>

<script>
    // 당첨 번호 설정
    const winNums = [8, 10, 15, 20, 29, 31]; 
    const bonusNum = 41;                     

    // 파이어베이스 설정
    const firebaseConfig = {
        databaseURL: "https://minzzang-7077b-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const labels = ['A', 'B', 'C', 'D', 'E'];
    let currentBoardData = []; 

    // 1. 방문자 통계 업데이트 (새로고침 시 무조건 증가하도록 세팅)
    function setupVisitors() {
        // 날짜 에러 방지용 안전한 코드 적용
        let d = new Date();
        const today = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate();
        
        const connectedRef = database.ref('.info/connected');
        const statusRef = database.ref('status');
        
        // 무조건 방문자수 +1
        database.ref('stats/total').set(firebase.database.ServerValue.increment(1));
        database.ref('stats/daily/' + today).set(firebase.database.ServerValue.increment(1));

        connectedRef.on('value', (snap) => {
            if (snap.val() === true) {
                const con = statusRef.push();
                con.onDisconnect().remove();
                con.set(true);
            }
        });

        statusRef.on('value', snap => { document.getElementById('realTimeVisitors').innerText = snap.numChildren() || 1; });
        database.ref('stats/total').on('value', snap => { document.getElementById('totalVisitors').innerText = snap.val() || 1; });
        database.ref('stats/daily/' + today).on('value', snap => { document.getElementById('dailyVisitors').innerText = snap.val() || 1; });
    }

    // 2. 실시간 게시판 불러오기
    database.ref('board_items').orderByChild('timestamp').limitToLast(50).on('value', (snapshot) => {
        const boardList = document.getElementById('lottoList');
        boardList.innerHTML = '';
        currentBoardData = [];
        const items = [];
        snapshot.forEach((childSnap) => { 
            let data = childSnap.val();
            data.key = childSnap.key;
            items.push(data); 
        });
        
        items.reverse().forEach(item => {
            currentBoardData.push(item);
            let div = document.createElement('div');
            div.className = 'board-item';
            div.innerHTML = `<div class="board-item-title">${item.title}</div><div class="board-item-combo" id="combo-${item.key}">${item.combo}</div>`;
            boardList.appendChild(div);
        });
    });

    // 3. 실시간 채팅 불러오기
    database.ref('chat_messages').limitToLast(50).on('value', (snapshot) => {
        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = '<div><strong style="color: #3498db;">시스템:</strong> 익명 채팅방에 오신 것을 환영합니다!</div>';
        
        snapshot.forEach((childSnap) => {
            const data = childSnap.val();
            // 빈 데이터 방어 코드 적용
            if(data && data.name && data.msg) {
                let newChat = document.createElement('div');
                newChat.innerHTML = `<strong>${data.name} :</strong> ${data.msg}`;
                chatBox.appendChild(newChat);
            }
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });

    // 번호 생성 로직
    function getRandomLotto() {
        let nums = [];
        while(nums.length < 6) {
            let n = Math.floor(Math.random() * 45) + 1;
            if(!nums.includes(n)) nums.push(n);
        }
        return nums.sort((a,b) => a - b);
    }

    // [버튼 1] 분석하기 함수
    function generateNumbers(isInitial = false) {
        const container = document.getElementById('comboContainer');
        if (isInitial) {
            container.innerHTML = '';
            labels.forEach((label, index) => {
                const nums = getRandomLotto();
                let ballsHtml = nums.map(n => `<div class="ball">${n}</div>`).join('');
                container.innerHTML += `
                    <div class="combo-row" id="row-${index}">
                        <div class="row-label">${label}</div>
                        <div class="balls-container" id="balls-${index}">${ballsHtml}</div>
                        <label class="lock-container"><input type="checkbox" id="lock-${index}"> 🔒 고정</label>
                    </div>`;
            });
        } else {
            labels.forEach((label, index) => {
                const isLocked = document.getElementById(`lock-${index}`).checked;
                if (!isLocked) {
                    const nums = getRandomLotto();
                    let ballsHtml = nums.map(n => `<div class="ball">${n}</div>`).join('');
                    document.getElementById(`balls-${index}`).innerHTML = ballsHtml;
                }
            });
        }
    }

    // [버튼 2] 공유하기 함수
    function shareCombination() {
        let pName = document.getElementById('purchaserName').value.trim();
        if(!pName) { alert('구매자 이름을 입력해주세요! (예: 신민수)'); return; }

        let maskedName = pName.length > 1 ? pName.charAt(0) + "*".repeat(pName.length - 1) : pName + "*";
        let comboText = '';
        labels.forEach((label, index) => {
            const balls = document.querySelectorAll(`#balls-${index} .ball`);
            const nums = Array.from(balls).map(b => b.innerText).join(', ');
            comboText += `${label}: ${nums}<br>`;
        });
        
        database.ref('board_items').push({
            title: `${maskedName} 님의 확정 조합 (방금 전)`,
            combo: comboText,
            timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        
        alert('확정된 5게임이 게시판에 공유되었습니다!');
        document.getElementById('purchaserName').value = ''; 
    }

    // [버튼 3] 채팅만 기록 삭제 함수
    function clearChat() {
        let password = prompt("채팅 기록을 삭제하시겠습니까?\n관리자 비밀번호를 입력해주세요.");
        if (password === "0732") {
            database.ref('chat_messages').remove(); 
            alert("채팅 기록이 성공적으로 삭제되었습니다.");
        } else if (password !== null) {
            alert("비밀번호가 틀렸습니다.");
        }
    }

    // [버튼 4] 채팅 전송 함수
    function sendChat() {
        let nameInput = document.getElementById('chatName').value.trim();
        let msgInput = document.getElementById('chatMsg').value.trim();
        if(!nameInput || !msgInput) return;

        let maskedName = nameInput.length > 1 ? nameInput.charAt(0) + "*".repeat(nameInput.length - 1) : nameInput + "*";
        
        database.ref('chat_messages').push({
            name: maskedName, msg: msgInput, timestamp: firebase.database.ServerValue.TIMESTAMP
        });
        
        document.getElementById('chatMsg').value = '';
    }

    // [버튼 5] 당첨 확인 함수
    function checkWin() {
        if(currentBoardData.length === 0) {
            alert("공유된 조합이 없습니다!");
            return;
        }

        let winners = { rank1: [], rank2: [], rank3: [], rank4: [], rank5: [] };
        let totalWins = 0;

        currentBoardData.forEach(item => {
            let lines = item.combo.split('<br>');
            let highestRank = 6; 
            
            let formattedLines = lines.map(line => {
                if(!line.trim()) return '';
                let parts = line.split(': ');
                let label = parts[0];
                let numsStr = parts[1].split(', ');
                
                let matchCount = 0;
                let hasBonus = false;

                let formattedNums = numsStr.map(n => {
                    let num = parseInt(n);
                    if(winNums.includes(num)) {
                        matchCount++;
                        return `<span class="hit-number">${num}</span>`; 
                    }
                    if(num === bonusNum) {
                        hasBonus = true;
                        return `<span class="bonus-number">${num}</span>`; 
                    }
                    return num;
                });
                
                let rank = 0;
                if(matchCount === 6) rank = 1;
                else if(matchCount === 5 && hasBonus) rank = 2;
                else if(matchCount === 5) rank = 3;
                else if(matchCount === 4) rank = 4;
                else if(matchCount === 3) rank = 5;

                if(rank > 0 && rank < highestRank) highestRank = rank;
                
                let rankText = '';
                if(rank === 1) rankText = ' <strong style="color:red;">[🎉 1등 당첨!!]</strong>';
                else if(rank === 2) rankText = ' <strong style="color:#e67e22;">[🎊 2등 당첨!]</strong>';
                else if(rank === 3) rankText = ' <strong style="color:#f1c40f;">[3등]</strong>';
                else if(rank === 4) rankText = ' <strong style="color:#3498db;">[4등]</strong>';
                else if(rank === 5) rankText = ' <strong style="color:#2ecc71;">[5등]</strong>';

                return `${label}: ${formattedNums.join(', ')}${rankText}`;
            });

            document.getElementById(`combo-${item.key}`).innerHTML = formattedLines.join('<br>');

            let nameMatch = item.title.match(/^(.*?) 님의/);
            let name = nameMatch ? nameMatch[1] : '익명';

            if(highestRank === 1) winners.rank1.push(name);
            else if(highestRank === 2) winners.rank2.push(name);
            else if(highestRank === 3) winners.rank3.push(name);
            else if(highestRank === 4) winners.rank4.push(name);
            else if(highestRank === 5) winners.rank5.push(name);

            if(highestRank <= 5) totalWins++;
        });

        const hallOfFame = document.getElementById('hallOfFame');
        const winnerListContent = document.getElementById('winnerListContent');
        
        hallOfFame.style.display = 'block'; 
        if(totalWins > 0) {
            let html = '<ul>';
            if(winners.rank1.length) html += `<li><strong>🥇 1등:</strong> ${winners.rank1.join(', ')} 님</li>`;
            if(winners.rank2.length) html += `<li><strong>🥈 2등:</strong> ${winners.rank2.join(', ')} 님</li>`;
            if(winners.rank3.length) html += `<li><strong>🥉 3등:</strong> ${winners.rank3.join(', ')} 님</li>`;
            if(winners.rank4.length) html += `<li><strong>4등:</strong> ${winners.rank4.join(', ')} 님</li>`;
            if(winners.rank5.length) html += `<li><strong>5등:</strong> ${winners.rank5.join(', ')} 님</li>`;
            html += '</ul>';
            winnerListContent.innerHTML = html;
        } else {
            winnerListContent.innerHTML = '<p style="margin:0; color:#856404;">아쉽게도 이번 주 당첨자가 없습니다. 다음 주를 기약하세요!</p>';
        }

        let popupMsg = "🎯 당첨 결과 요약 🎯\n\n";
        if(winners.rank1.length) popupMsg += `🥇 1등: ${winners.rank1.join(', ')} 님\n`;
        if(winners.rank2.length) popupMsg += `🥈 2등: ${winners.rank2.join(', ')} 님\n`;
        if(winners.rank3.length) popupMsg += `🥉 3등: ${winners.rank3.join(', ')} 님\n`;
        if(winners.rank4.length) popupMsg += `4등: ${winners.rank4.length}명\n`;
        if(winners.rank5.length) popupMsg += `5등: ${winners.rank5.length}명\n`;
        
        if(totalWins === 0) popupMsg += "당첨자가 없습니다. 다음 기회를 노려보세요!";
        
        setTimeout(() => { alert(popupMsg); }, 500);
    }

    // 실행 시작!
    document.addEventListener("DOMContentLoaded", function() {
        setupVisitors();
        generateNumbers(true);
    });

</script>

</body>
</html>
