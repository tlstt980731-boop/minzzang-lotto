<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>민짱 로또 분석기 - PRO (보안강화)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; }
        .lotto-ball { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 13px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .ball-10 { background: radial-gradient(circle at 30% 30%, #fbc02d, #f57f17); }
        .ball-20 { background: radial-gradient(circle at 30% 30%, #1976d2, #0d47a1); }
        .ball-30 { background: radial-gradient(circle at 30% 30%, #d32f2f, #b71c1c); }
        .ball-40 { background: radial-gradient(circle at 30% 30%, #7b1fa2, #4a148c); }
        .ball-45 { background: radial-gradient(circle at 30% 30%, #388e3c, #1b5e20); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg overflow-hidden border-t-8 border-blue-600 relative">
        <button onclick="secureReset()" class="absolute top-14 right-4 text-[10px] text-gray-400 hover:text-red-500 transition">기록 초기화</button>

        <div class="bg-gray-800 p-3 flex justify-around text-center text-white text-[10px]">
            <div><p class="text-gray-400">실시간</p><p id="online-count" class="text-green-400 font-bold text-sm">1</p></div>
            <div class="border-l border-gray-600"></div>
            <div><p class="text-gray-400">오늘 방문</p><p id="today-count" class="text-blue-300 font-bold text-sm">0</p></div>
            <div class="border-l border-gray-600"></div>
            <div><p class="text-gray-400">누적 방문</p><p id="total-count" class="text-yellow-400 font-bold text-sm">0</p></div>
        </div>

        <div class="p-6">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">🎰 민짱 로또 분석기 <span class="text-xs bg-red-500 text-white px-2 py-1 rounded-full">V4.1 SECURE</span></h1>
            <p class="text-center text-xs text-gray-400 mb-6">데이터 분석 기반 5게임 추천 시스템</p>
            
            <div class="mb-4">
                <input type="text" id="user-name" placeholder="닉네임 입력 (예: 신민수)" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <button onclick="analyzeAndGenerate5()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-bold py-4 rounded-lg shadow-md hover:scale-[1.02] transition mb-6">데이터 분석 후 번호 생성 (5게임)</button>

            <div id="result-area" class="hidden mb-8 space-y-4">
                <h2 class="font-bold text-center text-blue-800">✨ 최적 분석 조합 (5게임) ✨</h2>
                <div id="set-1" class="bg-gray-50 p-3 rounded-lg flex justify-around border border-gray-100"></div>
                <div id="set-2" class="bg-gray-50 p-3 rounded-lg flex justify-around border border-gray-100"></div>
                <div id="set-3" class="bg-gray-50 p-3 rounded-lg flex justify-around border border-gray-100"></div>
                <div id="set-4" class="bg-gray-50 p-3 rounded-lg flex justify-around border border-gray-100"></div>
                <div id="set-5" class="bg-gray-50 p-3 rounded-lg flex justify-around border border-gray-100"></div>
            </div>

            <hr class="my-6">
            <div>
                <h2 class="font-bold text-gray-800 mb-4 flex items-center">📢 실시간 공유 현황</h2>
                <div id="live-history" class="space-y-3 max-h-60 overflow-y-auto text-sm text-gray-600"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, query, limitToLast, set, onDisconnect, runTransaction, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOmZG3eeHBjQpXiEk0CbRgv1yDmA_YIZU",
            authDomain: "minzzang-7077b.firebaseapp.com",
            databaseURL: "https://minzzang-7077b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "minzzang-7077b",
            storageBucket: "minzzang-7077b.firebasestorage.app",
            messagingSenderId: "864825081953",
            appId: "1:864825081953:web:2d288161a1b3d750b92a20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- 방문자 및 실시간 상태 ---
        const todayStr = new Date().toISOString().split('T')[0];
        const onlineRef = ref(db, 'status/online_users');
        const totalRef = ref(db, 'status/total_visit');
        const todayRef = ref(db, 'status/today_visit/' + todayStr);

        const myPresenceRef = push(onlineRef);
        onDisconnect(myPresenceRef).remove();
        set(myPresenceRef, true);

        onValue(onlineRef, (snap) => document.getElementById('online-count').innerText = snap.size || 1);
        runTransaction(totalRef, (curr) => (curr || 0) + 1);
        runTransaction(todayRef, (curr) => (curr || 0) + 1);
        onValue(totalRef, (snap) => document.getElementById('total-count').innerText = snap.val() || 0);
        onValue(todayRef, (snap) => document.getElementById('today-count').innerText = snap.val() || 0);

        // --- 보안 초기화 로직 ---
        window.secureReset = function() {
            const pw = prompt("관리자 비밀번호를 입력하세요.");
            if (pw === "0732") {
                if (confirm("정말로 모든 방문 기록과 번호 생성 이력을 초기화하시겠습니까?")) {
                    remove(ref(db, 'status'));
                    remove(ref(db, 'lotto_history'));
                    alert("모든 데이터가 초기화되었습니다. 페이지를 새로고침하세요.");
                    location.reload();
                }
            } else {
                alert("비밀번호가 틀렸습니다!");
            }
        };

        // --- 번호 생성 로직 ---
        const hotNumbers = [1, 13, 17, 27, 34, 43, 12, 18, 45, 33];
        window.analyzeAndGenerate5 = function() {
            const nameInput = document.getElementById('user-name').value;
            if (!nameInput) { alert("이름을 입력해주세요!"); return; }

            let allSets = [];
            for(let i=1; i<=5; i++){
                let nums = [];
                while(nums.length < 2) {
                    let r = hotNumbers[Math.floor(Math.random() * hotNumbers.length)];
                    if(!nums.includes(r)) nums.push(r);
                }
                while(nums.length < 6) {
                    let r = Math.floor(Math.random() * 45) + 1;
                    if(!nums.includes(r)) nums.push(r);
                }
                nums.sort((a, b) => a - b);
                allSets.push(nums);
                showBalls(nums, 'set-'+i);
            }
            const maskName = nameInput.length > 2 ? nameInput[0] + "*" + nameInput[nameInput.length - 1] : nameInput[0] + "*";
            push(ref(db, 'lotto_history'), { userName: maskName, timestamp: Date.now() });
            document.getElementById('result-area').classList.remove('hidden');
        };

        function showBalls(nums, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            nums.forEach(n => {
                const colorClass = n <= 10 ? 'ball-10' : n <= 20 ? 'ball-20' : n <= 30 ? 'ball-30' : n <= 40 ? 'ball-40' : 'ball-45';
                container.innerHTML += `<div class
