<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>민짱 로또 분석기 - AI 통계 버전 (5개 조합)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f3f4f6; }
        .lotto-ball { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 13px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .ball-10 { background: radial-gradient(circle at 30% 30%, #fbc02d, #f57f17); }
        .ball-20 { background: radial-gradient(circle at 30% 30%, #1976d2, #0d47a1); }
        .ball-30 { background: radial-gradient(circle at 30% 30%, #d32f2f, #b71c1c); }
        .ball-40 { background: radial-gradient(circle at 30% 30%, #7b1fa2, #4a148c); }
        .ball-45 { background: radial-gradient(circle at 30% 30%, #388e3c, #1b5e20); }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto bg-white rounded-2xl shadow-lg overflow-hidden border-t-8 border-blue-600">
        <div class="p-6">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-2">🎰 민짱 로또 분석기 <span class="text-xs bg-red-500 text-white px-2 py-1 rounded-full">V3.0 AI분석</span></h1>
            <p class="text-center text-xs text-gray-400 mb-6">최근 10개년 당첨 가중치 데이터 반영됨 (5개 조합)</p>
            
            <div class="mb-4">
                <input type="text" id="user-name" placeholder="닉네임 입력 (예: 신민수)" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
            </div>

            <button onclick="analyzeAndGenerate5()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 text-white font-bold py-4 rounded-lg shadow-md hover:scale-[1.02] transition mb-6">데이터 분석 후 번호 생성 (5게임)</button>

            <div id="result-area" class="hidden mb-8 space-y-4">
                <h2 class="font-bold text-center text-blue-800">✨ 최적 분석 조합 (5게임) ✨</h2>
                <div id="set-1" class="bg-gray-50 p-3 rounded-lg flex justify-around"></div>
                <div id="set-2" class="bg-gray-50 p-3 rounded-lg flex justify-around"></div>
                <div id="set-3" class="bg-gray-50 p-3 rounded-lg flex justify-around"></div>
                <div id="set-4" class="bg-gray-50 p-3 rounded-lg flex justify-around"></div>
                <div id="set-5" class="bg-gray-50 p-3 rounded-lg flex justify-around"></div>
            </div>

            <hr class="my-6">
            <div>
                <h2 class="font-bold text-gray-800 mb-4 flex items-center">📢 실시간 공유 현황</h2>
                <div id="live-history" class="space-y-3 max-h-60 overflow-y-auto text-sm text-gray-600"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOmZG3eeHBjQpXiEk0CbRgv1yDmA_YIZU",
            authDomain: "minzzang-7077b.firebaseapp.com",
            databaseURL: "https://minzzang-7077b-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "minzzang-7077b",
            storageBucket: "minzzang-7077b.firebasestorage.app",
            messagingSenderId: "864825081953",
            appId: "1:864825081953:web:2d288161a1b3d750b92a20"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 자주 나오는 번호 가중치 (1, 13, 17, 27, 34, 43 등 통계 반영)
        const hotNumbers = [1, 13, 17, 27, 34, 43, 12, 18, 45, 33];

        window.analyzeAndGenerate5 = function() {
            const nameInput = document.getElementById('user-name').value;
            if (!nameInput) { alert("이름을 입력해주세요!"); return; }

            let allSets = [];
            for(let i=1; i<=5; i++){
                let nums = [];
                // 가중치 적용 로직: 2개는 자주 나오는 번호에서, 4개는 완전 랜덤에서 추출
                while(nums.length < 2) {
                    let r = hotNumbers[Math.floor(Math.random() * hotNumbers.length)];
                    if(!nums.includes(r)) nums.push(r);
                }
                while(nums.length < 6) {
                    let r = Math.floor(Math.random() * 45) + 1;
                    if(!nums.includes(r)) nums.push(r);
                }
                nums.sort((a, b) => a - b);
                allSets.push(nums);
                showBalls(nums, 'set-'+i); // 각 세트별로 공 보여주기
            }

            const maskName = nameInput.length > 2 ? nameInput[0] + "*" + nameInput[nameInput.length - 1] : nameInput[0] + "*";

            push(ref(db, 'lotto_history'), {
                userName: maskName,
                numbers: allSets, // 5개 조합 전체 저장
                timestamp: Date.now()
            });
            document.getElementById('result-area').classList.remove('hidden');
        };

        function showBalls(nums, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            nums.forEach(n => {
                const colorClass = n <= 10 ? 'ball-10' : n <= 20 ? 'ball-20' : n <= 30 ? 'ball-30' : n <= 40 ? 'ball-40' : 'ball-45';
                container.innerHTML += `<div class="lotto-ball ${colorClass}">${n}</div>`;
            });
        }

        const historyRef = query(ref(db, 'lotto_history'), limitToLast(10));
        onValue(historyRef, (snapshot) => {
            const historyDiv = document.getElementById('live-history');
            historyDiv.innerHTML = '';
            const data = snapshot.val();
            if (data) {
                Object.values(data).reverse().forEach(item => {
                    const time = new Date(item.timestamp).toLocaleTimeString();
                    historyDiv.innerHTML += `
                        <div class="bg-gray-50 p-2 rounded flex justify-between items-center border-l-4 border-indigo-400">
                            <span><strong>${item.userName}</strong> 님이 5게임 분석 번호 수령</span>
                            <span class="text-xs text-gray-400">${time}</span>
                        </div>`;
                });
            }
        });
    </script>
</body>
</html>
