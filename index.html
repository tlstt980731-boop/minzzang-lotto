<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>민짱 로또 분석기 v6.0</title>
    <style>
        :root { --primary: #2c3e50; --accent: #f39c12; --success: #27ae60; --light: #f8f9fa; --info: #3498db; }
        body { font-family: 'Pretendard', sans-serif; background: #f0f2f5; padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; }
        
        .header { background: var(--primary); color: white; padding: 25px; text-align: center; position: relative; }
        .reset-db { position: absolute; right: 20px; top: 20px; font-size: 11px; color: #bdc3c7; cursor: pointer; text-decoration: underline; }

        .guide-banner { background: #eef2f7; border-left: 5px solid var(--info); padding: 18px 25px; margin: 20px; border-radius: 8px; font-size: 14px; }
        .guide-banner h4 { margin: 0 0 8px 0; color: var(--info); }
        .privacy-note { margin-top: 10px; font-size: 12px; color: #e74c3c; font-weight: bold; }

        .control-panel { padding: 20px; background: #fdfdfd; display: flex; justify-content: center; gap: 20px; align-items: center; border-bottom: 1px solid #eee; }
        .input-group { display: flex; align-items: center; gap: 8px; }
        input { padding: 10px; border-radius: 8px; border: 1px solid #ddd; outline: none; }
        .round-input { width: 80px; font-weight: bold; text-align: center; }
        .name-input { width: 140px; }

        .content { padding: 25px; }
        .recommend-item { background: white; border: 1px solid #eee; margin-bottom: 15px; padding: 18px; border-radius: 15px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        
        .ball-row { display: flex; gap: 8px; }
        .ball { width: 34px; height: 34px; line-height: 34px; border-radius: 50%; color: white; font-weight: bold; font-size: 15px; text-align: center; }
        .c1 { background: linear-gradient(135deg, #fbc400, #f39c12); } 
        .c11 { background: linear-gradient(135deg, #69c8f2, #3498db); } 
        .c21 { background: linear-gradient(135deg, #ff7272, #e74c3c); } 
        .c31 { background: linear-gradient(135deg, #aaa, #7f8c8d); } 
        .c41 { background: linear-gradient(135deg, #b0d840, #27ae60); }

        .buy-btn { background: var(--success); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        .history-section { margin-top: 40px; }
        .history-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; }
        .history-table th, .history-table td { padding: 12px 8px; border-bottom: 1px solid #eee; text-align: center; }
        .history-table th { background: #f8f9fa; color: #777; font-weight: bold; }
        
        .main-btn { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; margin-bottom: 30px; transition: 0.3s; }
        .main-btn:hover { background: #1a252f; }
        .badge { padding: 4px 10px; border-radius: 20px; background: #edf2f7; font-size: 11px; font-weight: bold; color: #4a5568; }
        .status-tag { color: #27ae60; font-weight: bold; background: #eafff2; padding: 2px 6px; border-radius: 4px; border: 1px solid #27ae60; }
    </style>
</head>
<body onload="loadHistory()">

<div class="container">
    <div class="header">
        <h1>✨ 민짱 로또 분석기</h1>
        <span class="reset-db" onclick="clearData()">기록 초기화</span>
    </div>

    <div class="guide-banner">
        <h4>🔍 이용 방법 및 개인정보 안내</h4>
        <ul style="margin:0; padding-left:20px; font-size:13px;">
            <li><b>분석가명</b>에 본인의 성함을 입력해 주세요.</li>
            <li>조합 생성 후 <b>[구매 확정]</b> 시 아래 현황판에 실시간으로 기록됩니다.</li>
            <li>프라이버시를 위해 이름은 <b>'신**'</b> 형태로 자동 변환됩니다.</li>
        </ul>
        <div class="privacy-note">※ 기록된 데이터는 브라우저에 안전하게 보관됩니다.</div>
    </div>

    <div class="control-panel">
        <div class="input-group">
            <span>회차:</span>
            <input type="number" id="lottoRound" class="round-input" value="1217">
        </div>
        <div class="input-group">
            <span>분석가명:</span>
            <input type="text" id="userName" class="name-input" placeholder="이름을 입력하세요" oninput="saveUserName()">
        </div>
    </div>

    <div class="content">
        <button class="main-btn" onclick="generateFiveSets()">🎯 이번 회차 번호 추천받기 (5조합)</button>

        <div id="recommend-list"></div>

        <div class="history-section">
            <hr style="border:0; height:1px; background:#eee;">
            <h3 style="color: #2c3e50;">📊 실시간 번호 추천 및 구매 현황</h3>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>회차</th>
                        <th>구매 일시</th>
                        <th>분석가</th>
                        <th>추천 구매 번호</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
            <div id="empty-msg" style="text-align: center; padding: 40px; color: #bbb;">구매 현황 데이터가 없습니다.</div>
        </div>
    </div>
</div>

<script>
    function getBallColor(n) {
        if (n <= 10) return 'c1'; if (n <= 20) return 'c11'; if (n <= 30) return 'c21'; if (n <= 40) return 'c31'; return 'c41';
    }

    // 이름 마스킹 (예: 신민수 -> 신**)
    function maskName(name) {
        if (!name) return "익명";
        const trimmed = name.trim();
        if (trimmed.length <= 1) return trimmed;
        // 첫 글자 제외하고 모두 * 처리
        return trimmed[0] + '*'.repeat(trimmed.length - 1);
    }

    function saveUserName() {
        localStorage.setItem('minzzang_user', document.getElementById('userName').value);
    }

    function loadHistory() {
        const savedName = localStorage.getItem('minzzang_user');
        if(savedName) document.getElementById('userName').value = savedName;

        const savedHistory = JSON.parse(localStorage.getItem('minzzang_history')) || [];
        if(savedHistory.length > 0) {
            document.getElementById('empty-msg').style.display = 'none';
            // 최신순 정렬 후 표시
            [...savedHistory].reverse().forEach(data => addRowToTable(data));
        }
    }

    function createOneSet() {
        const balls = [];
        while(balls.length < 6) {
            let n = Math.floor(Math.random() * 45) + 1;
            if(!balls.includes(n)) balls.push(n);
        }
        return balls.sort((a, b) => a - b);
    }

    function generateFiveSets() {
        const nameInput = document.getElementById('userName');
        if(!nameInput.value.trim()) { alert("분석가 성함을 입력해 주세요!"); nameInput.focus(); return; }

        const listArea = document.getElementById('recommend-list');
        const round = document.getElementById('lottoRound').value;
        listArea.innerHTML = ''; 

        for(let i=1; i<=5; i++) {
            const set = createOneSet();
            const setHtml = `
                <div class="recommend-item">
                    <div><span class="badge">${round}회 - 추천 ${i}</span></div>
                    <div class="ball-row">
                        ${set.map(n => `<div class="ball ${getBallColor(n)}">${n}</div>`).join('')}
                    </div>
                    <button class="buy-btn" onclick="confirmPurchase(${round}, '${set.join(', ')}')">구매 확정</button>
                </div>
            `;
            listArea.innerHTML += setHtml;
        }
    }

    function confirmPurchase(round, numbers) {
        const fullName = document.getElementById('userName').value;
        const masked = maskName(fullName);
        
        // 상세 날짜/시간 생성 (2026-03-28 14:05:30 형식)
        const now = new Date();
        const dateStr = `${now.getMonth() + 1}/${now.getDate()}`;
        const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
        const fullTime = `${dateStr} ${timeStr}`;

        const newData = { round, fullTime, name: masked, numbers };

        const history = JSON.parse(localStorage.getItem('minzzang_history')) || [];
        history.push(newData);
        localStorage.setItem('minzzang_history', JSON.stringify(history));

        addRowToTable(newData, true);
        document.getElementById('empty-msg').style.display = 'none';
        alert(`[${masked}]님, ${round}회차 추천 번호 구매가 확정되었습니다!`);
    }

    function addRowToTable(data, isNew = false) {
        const historyBody = document.getElementById('history-body');
        const row = `
            <tr>
                <td style="font-weight:bold; color:#e74c3c;">${data.round}회</td>
                <td style="color:#666;">${data.fullTime}</td>
                <td><b>${data.name}</b></td>
                <td style="letter-spacing: 0.5px; font-family: monospace; font-weight: 600;">${data.numbers}</td>
                <td><span class="status-tag">구매완료</span></td>
            </tr>
        `;
        if(isNew) historyBody.insertAdjacentHTML('afterbegin', row);
        else historyBody.innerHTML += row;
    }

    function clearData() {
        if(confirm("기록을 모두 초기화하시겠습니까?")) {
            localStorage.removeItem('minzzang_history');
            location.reload();
        }
    }
</script>

</body>
</html>
