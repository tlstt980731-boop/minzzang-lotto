<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>민짱 로또/연금복권 분석기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; }
        header { text-align: center; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .stats { color: #7f8c8d; font-size: 0.9em; }
        /* 5. 이전 회차 당첨 번호 강조 */
        .winning-numbers { font-size: 1.2em; font-weight: bold; color: #e74c3c; margin-top: 10px; }
        
        .container { display: flex; gap: 20px; }
        .box { flex: 1; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* 6. 번호 고정 및 조합기 UI */
        .number-slots { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .slot { text-align: center; }
        .ball { width: 45px; height: 45px; border-radius: 50%; background: #3498db; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.2em; font-weight: bold; margin-bottom: 5px; }
        button { background: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 10px; }
        button:hover { background: #27ae60; }
        .btn-share { background: #e67e22; }
        .btn-share:hover { background: #d35400; }

        /* 3. 게시판 탭 분리 */
        .tabs { display: flex; margin-bottom: 15px; border-bottom: 2px solid #ddd; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; font-weight: bold; color: #95a5a6; }
        .tab.active { color: #2c3e50; border-bottom: 3px solid #3498db; }
        .board-content { display: none; }
        .board-content.active { display: block; }
        .board-item { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9em; }

        /* 2. 채팅방 UI */
        .chat-box { height: 200px; border: 1px solid #ddd; border-radius: 5px; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #fafafa; }
        .chat-input-area { display: flex; gap: 5px; }
        .chat-input-area input { padding: 8px; border: 1px solid #ccc; border-radius: 3px; }
        #chatName { width: 60px; }
        #chatMsg { flex: 1; }
    </style>
</head>
<body>

<header>
    <h1>민짱 로또/연금복권 분석기</h1>
    <div class="stats">누적 방문자수: 12,345명</div>
    <div class="winning-numbers">1217회 당첨번호: 8 10 15 20 29 31 + 41</div>
</header>

<div class="container">
    <div class="box">
        <h3>🎯 번호 조합기</h3>
        <div class="number-slots" id="slots">
            <div class="slot"><div class="ball" id="ball1">?</div><label><input type="checkbox" id="lock1"> 고정</label></div>
            <div class="slot"><div class="ball" id="ball2">?</div><label><input type="checkbox" id="lock2"> 고정</label></div>
            <div class="slot"><div class="ball" id="ball3">?</div><label><input type="checkbox" id="lock3"> 고정</label></div>
            <div class="slot"><div class="ball" id="ball4">?</div><label><input type="checkbox" id="lock4"> 고정</label></div>
            <div class="slot"><div class="ball" id="ball5">?</div><label><input type="checkbox" id="lock5"> 고정</label></div>
            <div class="slot"><div class="ball" id="ball6">?</div><label><input type="checkbox" id="lock6"> 고정</label></div>
        </div>
        <button onclick="generateNumbers()">🔄 선택되지 않은 번호 새로고침</button>
        <button class="btn-share" onclick="shareCombination()">📢 이 조합을 게시판에 즉시 공개</button>

        <h3 style="margin-top: 30px;">💬 실시간 채팅</h3>
        <div class="chat-box" id="chatBox">
            <div><strong style="color: #3498db;">시스템:</strong> 익명 채팅방에 오신 것을 환영합니다!</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatName" placeholder="닉네임" value="민짱">
            <input type="text" id="chatMsg" placeholder="메시지를 입력하세요" onkeypress="if(event.keyCode==13) sendMessage()">
            <button style="width: 60px; margin-bottom: 0;" onclick="sendMessage()">전송</button>
        </div>
    </div>

    <div class="box">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('lotto')">로또 게시판</div>
            <div class="tab" onclick="switchTab('pension')">연금복권 게시판</div>
        </div>
        
        <div id="lotto" class="board-content active">
            <h4>실시간 로또 조합 현황</h4>
            <div id="lottoList">
                <div class="board-item">익명 유저 - 12, 18, 23, 31, 38, 42 (방금 전)</div>
            </div>
        </div>
        
        <div id="pension" class="board-content">
            <h4>실시간 연금복권 조합 현황</h4>
            <div id="pensionList">
                <div class="board-item">익명 유저 - 3조 1 5 7 2 9 4 (5분 전)</div>
            </div>
        </div>
    </div>
</div>

<script>
    // [기능 6] 번호 고정 및 새로고침 로직
    function generateNumbers() {
        let numbers = [];
        // 고정되지 않은 번호들을 위해 랜덤 숫자 생성
        while(numbers.length < 6) {
            let num = Math.floor(Math.random() * 45) + 1;
            if(!numbers.includes(num)) numbers.push(num);
        }
        
        // 정렬을 위해 임시 배열에 현재 화면의 번호 상태를 담음
        let currentNumbers = [];
        let newIndex = 0;

        for(let i=1; i<=6; i++) {
            let isLocked = document.getElementById('lock'+i).checked;
            let ball = document.getElementById('ball'+i);
            
            if(isLocked && ball.innerText !== '?') {
                currentNumbers.push(parseInt(ball.innerText));
            } else {
                currentNumbers.push(numbers[newIndex]);
                newIndex++;
            }
        }

        // 고정된 번호는 그대로 두고 화면 업데이트
        for(let i=1; i<=6; i++) {
            document.getElementById('ball'+i).innerText = currentNumbers[i-1];
        }
    }

    // [기능 1] 조합 공개 게시판 자동 업데이트 로직
    function shareCombination() {
        let combo = [];
        for(let i=1; i<=6; i++) {
            let val = document.getElementById('ball'+i).innerText;
            if(val === '?') {
                alert('먼저 번호를 뽑아주세요!');
                return;
            }
            combo.push(val);
        }
        
        let boardList = document.getElementById('lottoList');
        let newItem = document.createElement('div');
        newItem.className = 'board-item';
        // 익명 처리하여 자동 등록
        newItem.innerText = `자동 공유 - ${combo.join(', ')} (방금 전)`;
        
        // 리스트의 맨 위에 추가
        boardList.insertBefore(newItem, boardList.firstChild);
        alert('조합 게시판에 번호가 성공적으로 공개되었습니다!');
    }

    // [기능 3] 게시판 탭 전환 로직
    function switchTab(tabId) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.board-content').forEach(c => c.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(tabId).classList.add('active');
    }

    // [기능 2] 실시간 채팅 익명(마스킹) 처리 로직
    function sendMessage() {
        let nameInput = document.getElementById('chatName').value.trim();
        let msgInput = document.getElementById('chatMsg').value.trim();
        
        if(!nameInput || !msgInput) return;

        // 이름 마스킹 처리 (예: 민짱 -> 민*, 홍길동 -> 홍*동)
        let maskedName = "";
        if(nameInput.length === 1) {
            maskedName = nameInput + "*";
        } else if(nameInput.length === 2) {
            maskedName = nameInput.substring(0, 1) + "*"; // '민짱'을 '민*'로 변경
        } else {
            maskedName = nameInput.substring(0, 1) + "*" + nameInput.substring(2);
        }

        let chatBox = document.getElementById('chatBox');
        let newChat = document.createElement('div');
        newChat.innerHTML = `<strong>${maskedName} :</strong> ${msgInput}`;
        
        chatBox.appendChild(newChat);
        chatBox.scrollTop = chatBox.scrollHeight; // 스크롤 맨 아래로
        
        document.getElementById('chatMsg').value = ''; // 입력창 초기화
    }
</script>

</body>
</html>
